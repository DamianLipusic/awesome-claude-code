<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmpireOS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- Title bar -->
  <div id="title-bar">
    <span id="empire-name" class="empire-name-btn" title="Click to rename">My Empire</span>
    <span id="age-badge" class="age-badge">🪨 Stone Age</span>
    <span id="season-badge" class="season-badge" title="Current season">🌸 Spring</span>
    <canvas id="minimap" title="Territory overview — open Map tab for details"></canvas>
    <span id="population-badge" class="population-badge" title="Citizens — build Houses to increase the cap">👥 100</span>
    <span id="weather-badge" class="weather-badge" style="display:none" title="Current weather conditions"></span>
    <span id="siege-badge" class="siege-badge" style="display:none" title="Barbarian Grand Siege incoming!"></span>
    <span id="streak-badge" class="streak-badge" style="display:none" title="Conquest streak — consecutive battle wins boost attack power"></span>
    <span id="title-badge" class="title-badge" title="Empire Title">🏕️ Village Chief</span>
    <span id="score-badge" title="Empire Score — see breakdown in the Empire tab">⭐ 0</span>
    <span id="prestige-badge" class="prestige-badge" title="Empire Prestige">✨ 0</span>
    <div class="title-bar__controls">
      <button class="btn btn--sm" id="btn-pause" title="Pause / Resume (Space)">⏸ Pause</button>
      <button class="btn btn--sm" id="btn-save">💾 Save</button>
      <button class="btn btn--sm" id="btn-new-game">🆕 New Game</button>
    </div>
  </div>

  <!-- Pause overlay (shown when game is paused) -->
  <div id="pause-overlay" class="pause-overlay pause-overlay--hidden" aria-hidden="true">
    <div class="pause-box">⏸ PAUSED<span class="pause-hint">Press Space or P to resume</span></div>
  </div>

  <!-- T117: Crisis banner — shown when an empire crisis is active -->
  <div id="crisis-banner" class="crisis-banner" style="display:none" role="alert" aria-live="assertive"></div>

  <!-- Resource HUD -->
  <div id="hud"><!-- populated by hud.js --></div>

  <!-- Tab bar -->
  <div id="tab-bar">
    <button data-tab="summary">📊 Empire</button>
    <button data-tab="buildings">🏗️ Buildings</button>
    <button data-tab="military">⚔️ Military</button>
    <button data-tab="map">🗺️ Map</button>
    <button data-tab="research">🔬 Research</button>
    <button data-tab="diplomacy">🤝 Diplomacy</button>
    <button data-tab="market">🏪 Market</button>
    <button data-tab="quests">🏆 Quests</button>
    <button data-tab="story">📖 History</button>
    <button data-tab="settings">⚙️ Settings</button>
    <button data-tab="log">📜 Log</button>
  </div>

  <!-- Main content -->
  <div id="content">
    <div data-panel="summary" id="panel-summary" class="panel--hidden">
      <!-- populated by summaryPanel.js -->
    </div>

    <div data-panel="buildings" id="panel-buildings">
      <!-- populated by buildingPanel.js -->
    </div>

    <div data-panel="military" id="panel-military" class="panel--hidden">
      <!-- populated by militaryPanel.js -->
    </div>

    <div data-panel="map" id="panel-map" class="panel--hidden">
      <!-- populated by mapPanel.js -->
    </div>

    <div data-panel="research" id="panel-research" class="panel--hidden">
      <!-- populated by researchPanel.js -->
    </div>

    <div data-panel="diplomacy" id="panel-diplomacy" class="panel--hidden">
      <!-- populated by diplomacyPanel.js -->
    </div>

    <div data-panel="market" id="panel-market" class="panel--hidden">
      <!-- populated by marketPanel.js -->
    </div>

    <div data-panel="quests" id="panel-quests" class="panel--hidden">
      <!-- populated by questPanel.js -->
    </div>

    <div data-panel="story" id="panel-story" class="panel--hidden">
      <!-- populated by storyPanel.js -->
    </div>

    <div data-panel="settings" id="panel-settings" class="panel--hidden">
      <!-- populated by settingsPanel.js -->
    </div>

    <div data-panel="log" class="panel--hidden">
      <div id="message-log">
        <!-- populated by messageLog.js -->
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
